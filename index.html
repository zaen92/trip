<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>여행 코스 찾기 🗺️</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#fff9f5;--card:#ffffff;--border:#f0e6da;--mid:#aaa;--p1:#ff8fab;--p2:#ffc8dd;--p3:#bde0fe;--p4:#a2d2ff;--p5:#caffbf;--dark:#3d3035}
body{background:var(--bg);font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;color:var(--dark);max-width:480px;margin:0 auto;min-height:100dvh;overflow-x:hidden}
.scr{display:none}.scr.on{display:block}
.hero{background:linear-gradient(135deg,#ffb3c6 0%,#ffc8dd 40%,#bde0fe 75%,#a2d2ff 100%);padding:52px 24px 40px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-30px;right:-30px;width:160px;height:160px;background:rgba(255,255,255,.22);border-radius:50%}
.hero::after{content:'';position:absolute;bottom:-40px;left:-20px;width:120px;height:120px;background:rgba(255,255,255,.18);border-radius:50%}
.hbg{display:inline-flex;background:#fff;color:var(--p1);font-family:'Jua',cursive;font-size:.84rem;letter-spacing:.5px;padding:5px 14px;border-radius:99px;margin-bottom:16px;position:relative;z-index:1;box-shadow:0 2px 8px rgba(255,143,171,.3)}
.hero h1{font-family:'Jua',cursive;font-size:2.4rem;color:#fff;line-height:1.2;position:relative;z-index:1;letter-spacing:-1px;text-shadow:0 2px 12px rgba(255,107,143,.2)}
.hero h1 em{font-style:normal;color:rgba(255,255,255,.95)}
.hero p{color:rgba(255,255,255,.92);font-size:.92rem;margin-top:10px;position:relative;z-index:1}
.wv{width:100%;overflow:hidden;line-height:0;background:linear-gradient(135deg,#ffc8dd,#bde0fe)}
.wv svg{display:block;width:100%;height:36px}
.sw{padding:28px 20px 100px}
.dots{display:flex;gap:8px;margin-bottom:26px;justify-content:center}
.dot{width:8px;height:8px;border-radius:50%;background:#f0d5e0;transition:all .3s}
.dot.on{width:28px;border-radius:4px;background:linear-gradient(90deg,var(--p1),var(--p4))}
.dot.dn{background:var(--p5)}
.qb{background:var(--card);border-radius:24px;padding:24px 20px;box-shadow:0 2px 0 #f7dce8,4px 6px 0 #f7dce8;border:1.5px solid #fce4ec;animation:pop .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{opacity:0;transform:scale(.93) translateY(14px)}to{opacity:1;transform:scale(1) translateY(0)}}
.qchip{display:inline-block;font-size:.76rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:4px 12px;border-radius:99px;margin-bottom:12px}
.qb h2{font-family:'Pretendard Variable',Pretendard,sans-serif;font-weight:500;font-size:1.4rem;line-height:1.4;margin-bottom:18px;letter-spacing:-0.4px}
/* 2열 그리드 옵션 */
.olist{display:flex;flex-direction:column;gap:10px}
.olist.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ob{background:#fff9fb;border:2px solid #fce4ec;border-radius:16px;padding:14px 15px;cursor:pointer;display:flex;align-items:center;gap:10px;font-family:'Pretendard Variable',Pretendard,sans-serif;font-size:.95rem;font-weight:500;color:var(--dark);text-align:left;-webkit-appearance:none;width:100%;transition:all .18s}
.ob:active{transform:scale(.97)}
.oi{font-size:1.4rem;flex-shrink:0}
.ot{flex:1;line-height:1.3;min-width:0}
.os{font-size:.78rem;color:var(--mid);display:block;margin-top:2px;font-weight:400}
.oc{width:20px;height:20px;border-radius:50%;border:2px solid #f0d5e0;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.68rem;color:#fff;transition:all .18s}
/* 슬라이더 */
.sb{margin-top:4px}
.sd{text-align:center;margin-bottom:22px}
.sv{font-family:'Jua',cursive;font-size:4rem;line-height:1;background:linear-gradient(135deg,var(--p1),var(--p4));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.su{font-size:.86rem;color:var(--mid);margin-top:6px}
.st{display:flex;align-items:center;gap:12px}
.sl{font-size:.78rem;color:var(--mid);font-weight:600;white-space:nowrap}
input[type=range]{-webkit-appearance:none;appearance:none;flex:1;height:8px;background:linear-gradient(90deg,var(--p1),var(--p3));border-radius:99px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:#fff;border:3px solid var(--p1);cursor:pointer;box-shadow:0 2px 10px rgba(255,143,171,.4);transition:transform .15s}
input[type=range]::-webkit-slider-thumb:active{transform:scale(1.2)}
.sm{display:flex;justify-content:space-between;margin-top:8px}
.sm span{font-size:.72rem;color:var(--mid)}
.nb{width:100%;margin-top:18px;background:linear-gradient(135deg,var(--p1),#ff6b9d 50%,var(--p4) 100%);color:#fff;border:none;border-radius:16px;padding:17px;font-family:'Jua',cursive;font-size:1.1rem;cursor:pointer;-webkit-appearance:none;box-shadow:0 4px 16px rgba(255,143,171,.45);transition:all .2s}
.nb:active{transform:scale(.98);box-shadow:0 2px 8px rgba(255,143,171,.3)}
.nb:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none}
/* 결과 */
#R{padding-bottom:80px}
.rh{padding:52px 24px 50px;text-align:center;position:relative;overflow:hidden}
.rh::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 70% 30%,rgba(255,255,255,.15),transparent 60%)}
.re{font-size:3.6rem;display:block;margin-bottom:12px;animation:bop .6s cubic-bezier(.34,1.56,.64,1);position:relative;z-index:1}
@keyframes bop{0%{transform:scale(.5) translateY(20px)}60%{transform:scale(1.15) translateY(-4px)}100%{transform:scale(1) translateY(0)}}
.rt{font-family:'Pretendard Variable',Pretendard,sans-serif;font-weight:500;font-size:2.05rem;color:#fff;line-height:1.2;position:relative;z-index:1;text-shadow:0 2px 12px rgba(0,0,0,.15);letter-spacing:-0.6px}
.rs{color:rgba(255,255,255,.92);font-size:.92rem;margin-top:8px;position:relative;z-index:1}
.rm{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:16px;position:relative;z-index:1}
.rc{background:rgba(255,255,255,.28);color:#fff;font-size:.8rem;font-weight:700;padding:5px 13px;border-radius:99px}
.rw{width:100%;overflow:hidden;line-height:0}
.rw svg{display:block;width:100%;height:32px}
.rb{padding:0 16px}
.sh{font-family:'Pretendard Variable',Pretendard,sans-serif;font-weight:500;font-size:1.275rem;margin:26px 0 14px;display:flex;align-items:center;gap:8px;letter-spacing:-0.3px}
.sn{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.72rem;color:#fff;font-weight:700;flex-shrink:0}
/* 타임라인 */
.tl{display:flex;flex-direction:column;gap:12px}
.ti{background:var(--card);border-radius:18px;padding:18px 18px 18px 20px;border:1.5px solid var(--border);box-shadow:3px 4px 0 #f0e0e8;display:flex;gap:14px;animation:slr .45s ease both}
.ti:nth-child(1){animation-delay:.06s}.ti:nth-child(2){animation-delay:.14s}.ti:nth-child(3){animation-delay:.22s}.ti:nth-child(4){animation-delay:.30s}.ti:nth-child(5){animation-delay:.38s}.ti:nth-child(6){animation-delay:.44s}
/* optional 스팟 표시 */
.ti.opt-stop{border-style:dashed;border-color:var(--p2);background:#fffcfd}
.ti.opt-stop::before{content:'✨';font-size:.75rem;position:absolute;right:12px;top:12px}
.ti{position:relative}
@keyframes slr{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:translateX(0)}}
.tc{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0;padding-top:2px}
.tcr{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem}
.tl2{font-size:.72rem;font-weight:700;color:var(--mid);white-space:nowrap}
.tf{flex:1;min-width:0}
.tty{font-size:.72rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.tn{font-family:'Pretendard Variable',Pretendard,sans-serif;font-weight:500;font-size:1.125rem;margin-bottom:6px;line-height:1.3;letter-spacing:-0.2px}
.td{font-size:.92rem;color:#666;line-height:1.65;margin-bottom:10px}
.tg{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.tgi{background:var(--bg);border:1px solid var(--border);border-radius:99px;padding:4px 11px;font-size:.78rem;color:#888}
.tst{font-size:.86rem;font-weight:700;margin-left:auto}
.tcost{font-size:.82rem;color:var(--mid);margin-left:6px}
/* 예산 조절 */
.bc{background:var(--card);border-radius:18px;padding:20px;border:1.5px solid var(--border);box-shadow:3px 4px 0 #f0e0e8;margin-bottom:12px}
.bgr{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.brow{background:var(--bg);border-radius:12px;padding:12px;display:flex;flex-direction:column;gap:4px}
.bl{font-size:.8rem;color:var(--mid)}.bv{font-family:'Jua',cursive;font-size:1.15rem}
.adj{background:linear-gradient(135deg,#ffeef5 0%,#e8f4ff 100%);border-radius:16px;padding:18px;border:1.5px solid #fcd5e0}
.adj-title{font-size:.78rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--p1);margin-bottom:14px}
.adj-display{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.adj-num-wrap{display:flex;align-items:baseline;gap:3px;flex:1}
.adj-num{font-family:'Jua',cursive;font-size:2.8rem;line-height:1;background:linear-gradient(135deg,var(--p1),var(--p4));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.adj-unit{font-size:.95rem;color:var(--mid)}
.adj-badge{font-size:.82rem;font-weight:700;padding:4px 12px;border-radius:99px;background:#fff;border:1.5px solid var(--border);color:var(--mid);transition:all .25s}
.adj-track{display:flex;align-items:center;gap:10px}
.adj-lbl{font-size:.8rem;color:var(--mid);white-space:nowrap;font-weight:600}
.adj-slider{-webkit-appearance:none;appearance:none;flex:1;height:8px;background:linear-gradient(90deg,var(--p1),var(--p3));border-radius:99px;outline:none;cursor:pointer}
.adj-slider::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:#fff;border:3px solid var(--p1);cursor:pointer;box-shadow:0 2px 10px rgba(255,143,171,.4);transition:transform .15s}
.adj-slider::-webkit-slider-thumb:active{transform:scale(1.2)}
.adj-marks{display:flex;justify-content:space-between;margin-top:7px}
.adj-marks span{font-size:.72rem;color:var(--mid)}
.adj-tip{margin-top:12px;font-size:.86rem;color:#777;line-height:1.6}
.adj-notice{margin-top:10px;background:#fff;border-radius:10px;padding:12px 14px;font-size:.86rem;color:#555;line-height:1.65;border-left:3px solid var(--p1)}
.btot{border-radius:14px;padding:15px;display:flex;justify-content:space-between;align-items:center;margin-top:14px;background:linear-gradient(135deg,var(--p1),var(--p4))}
.btot-lbl{font-size:.92rem;color:rgba(255,255,255,.85);font-weight:600}
.btot-val{font-family:'Jua',cursive;font-size:1.6rem;color:#fff}
.tp{background:linear-gradient(135deg,#f0fff4,#e8f4ff);border-radius:18px;padding:20px;border:1.5px solid #caf0d0;box-shadow:3px 4px 0 #d8f0dc;margin-bottom:12px}
.tr{display:flex;gap:12px;padding:10px 0;border-bottom:1px dashed #cde8d0;font-size:.92rem;color:#555;line-height:1.6}
.tr:last-child{border-bottom:none;padding-bottom:0}
.tic{flex-shrink:0}
.rbtn{width:100%;background:#fff;border:2px solid #fcd5e0;border-radius:14px;padding:15px;font-family:'Jua',cursive;font-size:1rem;color:var(--p1);cursor:pointer;box-shadow:3px 4px 0 #fcd5e0;transition:all .18s;margin-top:4px}
.rbtn:active{transform:translate(2px,3px);box-shadow:none}
.nm{background:var(--card);border-radius:18px;padding:32px 24px;text-align:center;border:1.5px solid var(--border);box-shadow:3px 4px 0 #f0e0e8}

/* ── 카카오맵 모달 ── */
.map-btns{display:flex;gap:6px;margin-top:8px}
.map-btn{background:linear-gradient(135deg,#fff0f5,#e8f4ff);border:1.5px solid #fcd5e0;border-radius:10px;padding:8px 13px;font-size:.84rem;font-weight:600;color:var(--p1);cursor:pointer;font-family:inherit;transition:all .15s;text-decoration:none;display:inline-block}
.map-btn:active{transform:scale(.96)}
.map-btn-ghost{background:#fff;color:var(--p4);border-color:#c5e0ff}
.map-overlay{position:fixed;inset:0;background:rgba(61,48,53,.5);backdrop-filter:blur(4px);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.map-modal{background:#fff;border-radius:20px;max-width:440px;width:100%;max-height:85vh;overflow:hidden;display:flex;flex-direction:column;animation:popIn .3s cubic-bezier(.34,1.56,.64,1);box-shadow:0 20px 60px rgba(0,0,0,.2)}
@keyframes popIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.map-modal-head{background:linear-gradient(135deg,#ffc8dd,#bde0fe);padding:16px 18px;display:flex;justify-content:space-between;align-items:center;color:#fff}
.map-modal-title{font-family:'Pretendard Variable',Pretendard,sans-serif;font-weight:500;font-size:1.225rem;flex:1;text-shadow:0 1px 4px rgba(0,0,0,.15);letter-spacing:-0.3px}
.map-close{background:rgba(255,255,255,.25);border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:1rem;cursor:pointer;font-weight:700;transition:all .15s}
.map-close:active{transform:scale(.9);background:rgba(255,255,255,.4)}
.map-modal-body{padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
#MAP_CANVAS{width:100%;height:200px;border-radius:14px;background:linear-gradient(135deg,#f0f4ff,#fff0f5);overflow:hidden;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:.84rem}
#MAP_CANVAS:empty::before{content:"🗺️ 지도가 여기 표시돼요";font-size:.86rem}
.map-info{background:linear-gradient(135deg,#fff9f5,#fff0f5);border-radius:12px;padding:13px 15px;font-size:.92rem;color:#555;line-height:1.7;border-left:3px solid var(--p1)}
.map-info .map-addr{font-weight:600;color:var(--dark)}
.map-info .map-phone{margin-top:4px;color:#0077b6;font-weight:600}
.map-info .map-cat{margin-top:5px;color:var(--mid);font-size:.84rem}
.map-info .map-notice{margin-top:10px;padding-top:10px;border-top:1px dashed #fcd5e0;font-size:.84rem;color:#888;line-height:1.65}
.map-info .map-notice b{color:var(--p1);font-weight:700}
.map-list-wrap{margin-top:8px}
.map-list-title{font-size:.88rem;font-weight:700;color:var(--p1);padding:10px 0 6px;letter-spacing:.5px}
.map-list{display:flex;flex-direction:column;gap:6px}
.map-list-item{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:10px 12px;cursor:pointer;transition:all .15s}
.map-list-item:hover{border-color:var(--p1);background:#fff9fb}
.map-list-item:active{transform:scale(.98)}
.map-list-name{font-family:'Pretendard Variable',Pretendard,sans-serif;font-weight:500;font-size:1.04rem;color:var(--dark);margin-bottom:4px;letter-spacing:-0.2px}
.map-list-addr{font-size:.82rem;color:#777;line-height:1.55}
.map-list-cat{font-size:.78rem;color:var(--mid);margin-top:4px}
.map-noresult{text-align:center;padding:20px 16px;background:linear-gradient(135deg,#fff9f5,#fff0f5);border-radius:14px}
.map-noresult-icon{font-size:2.4rem;margin-bottom:10px}
.map-noresult-title{font-family:'Pretendard Variable',Pretendard,sans-serif;font-weight:500;font-size:1.125rem;color:var(--p1);margin-bottom:8px;letter-spacing:-0.2px}
.map-noresult-desc{font-size:.92rem;color:#666;line-height:1.7}
.map-noresult-desc b{color:var(--dark);font-weight:700}
.map-info code{background:#fff;padding:2px 6px;border-radius:4px;font-size:.78rem;color:var(--p1);border:1px solid #fcd5e0}
.map-info a.map-btn-link{display:block;margin-top:10px;background:var(--p1);color:#fff;padding:10px;border-radius:10px;text-align:center;text-decoration:none;font-weight:700}
.map-actions{display:flex;gap:8px;flex-wrap:wrap}
.map-btn-action{flex:1;min-width:110px;background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:12px;text-align:center;text-decoration:none;font-size:.92rem;font-weight:700;color:var(--dark);cursor:pointer;transition:all .15s}
.map-btn-action:active{transform:scale(.97)}
.map-btn-primary{background:linear-gradient(135deg,var(--p1),#ff6b9d);color:#fff;border:none}
.map-btn-search{background:#f5f0ff;color:#9060c0;border:1.5px solid #e0d0f5;flex:0 0 auto;min-width:auto}

/* ── API 키 안내 배너 ── */
.api-banner{background:linear-gradient(135deg,#fff3cd,#ffe5a0);border:2px solid #ffd166;border-radius:14px;padding:14px 16px;margin:14px 16px 0;font-size:.9rem;color:#8b6914;line-height:1.65}
.api-banner b{color:#664d03}
.api-banner code{background:#fff;padding:2px 6px;border-radius:4px;font-size:.78rem;color:#c77dff;font-family:monospace;border:1px solid #e0c87a}
.api-banner a{color:#ff6b9d;font-weight:700}

/* ── 모바일 전용 가독성 개선 ── */
@media (max-width: 480px) {
  body { font-size: 16px; }
  .olist.grid2 { grid-template-columns: 1fr !important; }
  .hero h1 { font-size: 2.2rem; }
  .hero p { font-size: 0.95rem; }
  .qb h2 { font-size: 1.45rem; line-height: 1.45; }
  .ob { font-size: 1rem; padding: 15px 16px; }
  .os { font-size: 0.82rem; margin-top: 3px; }
  .oi { font-size: 1.5rem; }
  .nb { font-size: 1.15rem; padding: 18px; }
  .rt { font-size: 1.95rem; }
  .rs { font-size: 0.95rem; }
  .rc { font-size: 0.84rem; padding: 6px 14px; }
  .sh { font-size: 1.32rem; margin: 28px 0 14px; }
  .tn { font-size: 1.18rem; }
  .td { font-size: 0.96rem; line-height: 1.7; }
  .tgi { font-size: 0.82rem; padding: 5px 12px; }
  .tst { font-size: 0.9rem; }
  .tcost { font-size: 0.86rem; }
  .tl2 { font-size: 0.76rem; }
  .tty { font-size: 0.76rem; }
  .bl { font-size: 0.84rem; }
  .bv { font-size: 1.2rem; }
  .adj-num { font-size: 3rem; }
  .adj-unit { font-size: 1rem; }
  .adj-tip { font-size: 0.92rem; }
  .adj-notice { font-size: 0.92rem; padding: 13px 15px; }
  .btot-val { font-size: 1.7rem; }
  .btot-lbl { font-size: 0.95rem; }
  .tr { font-size: 0.96rem; padding: 11px 0; }
  .map-modal-title { font-size: 1.28rem; }
  .map-info { font-size: 0.96rem; padding: 14px 16px; }
  .map-info .map-cat { font-size: 0.88rem; }
  .map-info .map-notice { font-size: 0.88rem; }
  .map-list-name { font-size: 1.08rem; }
  .map-list-addr { font-size: 0.86rem; }
  .map-btn-action { font-size: 0.96rem; padding: 13px; }
  .map-btn { font-size: 0.88rem; padding: 9px 14px; }
}
</style>

<body>

var KAKAO_READY = false;
var placeCache = {}; // 검색 결과 캐시

// 카카오 SDK 로드
function loadKakaoSDK() {
  console.log("🔍 [카카오맵] loadKakaoSDK 시작");
  console.log("🔍 [카카오맵] 현재 KAKAO_JS_KEY:", KAKAO_JS_KEY ? KAKAO_JS_KEY.substring(0,6) + "..." : "(없음)");
  console.log("🔍 [카카오맵] 현재 도메인:", window.location.origin);
  console.log("🔍 [카카오맵] 프로토콜:", window.location.protocol);

  if (window.location.protocol === "file:") {
    console.error("❌ [카카오맵] file:// 프로토콜로 열면 카카오맵이 동작하지 않아요!");
    console.error("    → 로컬 서버를 띄워서 http://localhost 로 열어야 해요.");
    console.error("    → 쉬운 방법: 터미널에서 'python3 -m http.server 8000' 실행 후 http://localhost:8000 접속");
    return;
  }

  if (!KAKAO_JS_KEY || KAKAO_JS_KEY === "YOUR_KAKAO_JAVASCRIPT_KEY_HERE") {
    console.warn("⚠️ [카카오맵] API 키가 설정되지 않았어요.");
    return;
  }

  // 기존 SDK 스크립트 태그 제거하고 새로 삽입 (키 교체 확실히)
  var oldSdk = document.getElementById("KAKAO_SDK");
  if (oldSdk) oldSdk.remove();

  var sdk = document.createElement("script");
  sdk.id = "KAKAO_SDK";
  sdk.src = "https://dapi.kakao.com/v2/maps/sdk.js?appkey=" + KAKAO_JS_KEY + "&libraries=services&autoload=false";
  sdk.onload = function() {
    console.log("✅ [카카오맵] SDK 스크립트 로드 완료");
    if (window.kakao && window.kakao.maps) {
      kakao.maps.load(function() {
        KAKAO_READY = true;
        console.log("✅ [카카오맵] SDK 준비 완료! 이제 사용 가능합니다.");
      });
    }
  };
  sdk.onerror = function(e) {
    console.error("❌ [카카오맵] SDK 로드 실패!");
    console.error("    → 카카오 개발자 사이트에서 이 도메인이 등록됐는지 확인하세요:", window.location.origin);
    console.error("    → https://developers.kakao.com → 내 애플리케이션 → 앱 선택 → 플랫폼 → Web 플랫폼");
  };
  document.head.appendChild(sdk);
}

// DOM 로드 후 실행
if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", loadKakaoSDK);
} else {
  loadKakaoSDK();
}

// 장소 검색 (Promise)
function searchPlace(query, cityDistrict) {
  return new Promise(function(resolve, reject) {
    if (!KAKAO_READY) {
      reject(new Error("카카오 SDK 미준비"));
      return;
    }
    var searchQuery = query;
    if (placeCache[searchQuery]) {
      resolve(placeCache[searchQuery]);
      return;
    }
    var places = new kakao.maps.services.Places();
    places.keywordSearch(searchQuery, function(data, status) {
      if (status === kakao.maps.services.Status.OK && data.length > 0) {
        // 여러 결과 모두 반환 (최대 5개)
        var results = data.slice(0, 5);
        placeCache[searchQuery] = results;
        resolve(results);
      } else {
        reject(new Error("검색 결과 없음"));
      }
    });
  });
}

// 카카오맵 바로가기 URL 생성
function kakaoMapUrl(query) {
  return "https://map.kakao.com/?q=" + encodeURIComponent(query);
}

// 카카오 길찾기 URL (출발지-목적지)
function kakaoDirectionsUrl(place) {
  if (place && place.id) {
    return "https://map.kakao.com/link/to/" + encodeURIComponent(place.place_name) + "," + place.y + "," + place.x;
  }
  return null;
}

// 스팟 상세 팝업 열기 (지도 + 길찾기 버튼)
function openSpotDetail(query, cityDistrict) {
  var overlay = document.createElement("div");
  overlay.className = "map-overlay";
  overlay.innerHTML = '<div class="map-modal">'
    + '<div class="map-modal-head">'
    + '<div class="map-modal-title" id="MMT">' + query + '</div>'
    + '<button class="map-close" onclick="closeMapModal()">✕</button>'
    + '</div>'
    + '<div class="map-modal-body">'
    + '<div id="MAP_CANVAS"></div>'
    + '<div class="map-info" id="MAP_INFO">🔎 검색 중...</div>'
    + '<div class="map-actions" id="MAP_ACTIONS"></div>'
    + '<div class="map-list-wrap" id="MAP_LIST"></div>'
    + '</div></div>';
  document.body.appendChild(overlay);
  
  if (!KAKAO_READY) {
    document.getElementById("MAP_INFO").innerHTML = 
      '<div style="color:#e06080;line-height:1.6">⚠️ 카카오맵 SDK가 아직 준비되지 않았어요.<br>' +
      '콘솔(F12)을 열어서 오류를 확인해주세요.<br><br>' +
      '💡 <b>빠른 해결법</b><br>' +
      '1. 터미널에서 <code>python3 -m http.server 8000</code><br>' +
      '2. <code>http://localhost:8000</code>로 접속<br>' +
      '3. 카카오 개발자 사이트에서 <code>http://localhost:8000</code> 도메인 등록</div>' +
      '<a class="map-btn-link" href="' + kakaoMapUrl(query) + '" target="_blank">🗺️ 카카오맵에서 직접 검색하기</a>';
    return;
  }

  searchPlace(query, cityDistrict).then(function(places) {
    // places는 이제 배열 (최대 5개)
    var resultsArr = Array.isArray(places) ? places : [places];
    
    // 첫 번째 결과를 기본 선택
    showSelectedPlace(resultsArr[0], query);
    
    // 다른 결과들을 리스트로 표시
    if (resultsArr.length > 1) {
      var listHtml = '<div class="map-list-title">🔍 다른 후보 (' + (resultsArr.length - 1) + '개)</div>';
      listHtml += '<div class="map-list">';
      for (var i = 1; i < resultsArr.length; i++) {
        var p = resultsArr[i];
        listHtml += '<div class="map-list-item" data-idx="' + i + '">';
        listHtml += '<div class="map-list-name">' + p.place_name + '</div>';
        listHtml += '<div class="map-list-addr">📍 ' + (p.road_address_name || p.address_name) + '</div>';
        if (p.category_name) {
          listHtml += '<div class="map-list-cat">' + p.category_name + '</div>';
        }
        listHtml += '</div>';
      }
      listHtml += '</div>';
      document.getElementById("MAP_LIST").innerHTML = listHtml;
      
      // 리스트 클릭 이벤트
      document.querySelectorAll(".map-list-item").forEach(function(item) {
        item.addEventListener("click", function() {
          var idx = parseInt(this.getAttribute("data-idx"));
          showSelectedPlace(resultsArr[idx], query);
          // 스크롤 위로
          document.querySelector(".map-modal-body").scrollTop = 0;
        });
      });
    }
  }).catch(function(err) {
    // 검색 실패 시 - 더 일반적인 키워드로 재시도
    var simpleQuery = query.split(" ").slice(0, 2).join(" ");
    document.getElementById("MAP_INFO").innerHTML = 
      '<div class="map-noresult">'
      + '<div class="map-noresult-icon">🔎</div>'
      + '<div class="map-noresult-title">정확한 결과를 찾지 못했어요</div>'
      + '<div class="map-noresult-desc"><b>' + query + '</b>에 해당하는 가게가<br>카카오맵에 등록되지 않았을 수 있어요.<br><br>'
      + '아래 버튼으로 <b>「' + simpleQuery + '」</b> 검색 결과를 확인하거나,<br>다른 키워드로 직접 찾아보세요!</div>'
      + '</div>';
    document.getElementById("MAP_ACTIONS").innerHTML = 
      '<a class="map-btn-action map-btn-primary" href="' + kakaoMapUrl(simpleQuery) + '" target="_blank">🗺️ ' + simpleQuery + ' 검색 →</a>'
      + '<a class="map-btn-action" href="' + kakaoMapUrl(query) + '" target="_blank">🔍 원래 검색어로</a>';
  });
}

// 선택된 가게를 모달에 표시
function showSelectedPlace(place, query) {
  document.getElementById("MMT").textContent = place.place_name;
  document.getElementById("MAP_INFO").innerHTML = 
    '<div class="map-addr">📍 ' + place.road_address_name + (place.address_name ? ' · ' + place.address_name : '') + '</div>'
    + (place.phone ? '<div class="map-phone">📞 ' + place.phone + '</div>' : '')
    + (place.category_name ? '<div class="map-cat">🏷️ ' + place.category_name + '</div>' : '')
    + '<div class="map-notice">💡 카카오맵 검색 결과 중 하나예요. 추천한 코스와 다를 수 있으니 <b>아래 다른 후보</b>나 <b>「다른 결과」</b>에서 마음에 드는 곳을 선택하세요!</div>';
  document.getElementById("MAP_ACTIONS").innerHTML = 
    '<a class="map-btn-action map-btn-primary" href="' + kakaoDirectionsUrl(place) + '" target="_blank">🧭 길찾기</a>'
    + '<a class="map-btn-action" href="http://place.map.kakao.com/' + place.id + '" target="_blank">ℹ️ 상세 정보</a>'
    + '<a class="map-btn-action map-btn-search" href="' + kakaoMapUrl(query) + '" target="_blank">🔍 다른 결과</a>';

  // 지도 다시 그리기
  var container = document.getElementById("MAP_CANVAS");
  container.innerHTML = ""; // 초기화
  var options = {
    center: new kakao.maps.LatLng(place.y, place.x),
    level: 3
  };
  var map = new kakao.maps.Map(container, options);
  var marker = new kakao.maps.Marker({
    position: new kakao.maps.LatLng(place.y, place.x)
  });
  marker.setMap(map);
  var infowindow = new kakao.maps.InfoWindow({
    content: '<div style="padding:8px 12px;font-size:13px;font-weight:700;color:#ff6b9d">' + place.place_name + '</div>'
  });
  infowindow.open(map, marker);
}

function closeMapModal() {
  var ov = document.querySelector(".map-overlay");
  if (ov) ov.remove();
}

// ── 스텝 배열 재구성 ──────────────────────────────
// 항상 호출 시점의 ans 기준으로 전체 스텝 재계산
function rebuildSteps() {
  steps = [];

  // STEP 0: 도시
  steps.push({
    id: "city",
    ch: "📍 도시", cc: "#ff8fab",
    q:  "어느 도시로 떠나시나요?",
    opts: Object.keys(CITY_META).map(function(city) {
      return {e: CITY_META[city].e, t: city, s: CITY_META[city].districts.join(" · ")};
    })
  });

  // STEP 1: 동네 (도시 선택된 경우만, 동네 2개 이상일 때만)
  if (ans.city) {
    var dlist = CITY_META[ans.city] ? CITY_META[ans.city].districts : [];
    if (dlist.length >= 2) {
      steps.push({
        id: "district",
        ch: "📌 동네", cc: "#c77dff",
        q:  ans.city + "의 어느 동네로 가실 건가요?",
        opts: dlist.map(function(d) {
          // 해당 동네 가능한 스타일 목록
          var vs = [];
          for (var i = 0; i < COURSES.length; i++) {
            var c = COURSES[i];
            if (c.city === ans.city && c.district === d && vs.indexOf(c.vibe) === -1) {
              vs.push(c.vibe);
            }
          }
          return {e: "📌", t: d, s: vs.join(" · ")};
        })
      });
    } else if (dlist.length === 1) {
      // 동네 1개면 자동 선택 (스텝 안 보임)
      ans.district = dlist[0];
    }
  }

  // STEP 2: 여행 스타일 (도시+동네 선택된 경우)
  if (ans.city) {
    var district = ans.district || (CITY_META[ans.city] ? CITY_META[ans.city].districts[0] : null);
    var availVibes = [];
    if (district) {
      for (var i = 0; i < COURSES.length; i++) {
        var c = COURSES[i];
        if (c.city === ans.city && c.district === district && availVibes.indexOf(c.vibe) === -1) {
          availVibes.push(c.vibe);
        }
      }
    }
    // 없으면 전체 보여줌
    if (availVibes.length === 0) availVibes = ["맛집","자연","문화"];
    steps.push({
      id: "vibe",
      ch: "🎯 스타일", cc: "#ffd166",
      q:  "어떤 여행을 원하시나요?",
      opts: availVibes.map(function(v) {
        return {e: VIBE_META[v].e, t: v, s: VIBE_META[v].s};
      })
    });
  }

  // STEP 3: 동행 (스타일 선택된 경우)
  if (ans.vibe || ans.city) {
    steps.push({
      id: "who",
      ch: "👥 동행", cc: "#caffbf",
      q:  "누구랑 함께 가세요?",
      opts: WHO_META
    });
  }

  // STEP 4: 예산 (항상 마지막)
  if (ans.who || ans.city) {
    steps.push({id: "budget", ch: "💰 예산", cc: "#ffb3c6", q: "하루 예산을 설정해주세요 (1인)"});
  }
}

// ── dots 렌더링 ────────────────────────────────────
function renderDots() {
  var total = steps.length;
  var html  = "";
  for (var i = 0; i < total; i++) {
    var cls = "dot";
    if (i === step) cls += " on";
    else if (i < step) cls += " dn";
    html += '<div class="' + cls + '"></div>';
  }
  document.getElementById("DT").innerHTML = html;
}

// ── 스텝 렌더링 ───────────────────────────────────
function render(s) {
  step = s;
  rebuildSteps();       // 항상 최신 ans 기준으로 스텝 재계산
  renderDots();

  // step이 steps 범위를 벗어나면 처음으로
  if (step >= steps.length) { step = 0; }
  var q = steps[step];
  if (!q) { step = 0; q = steps[0]; }

  var isLast = (step === steps.length - 1);
  var cc = q.cc;
  var h  = '<div class="qchip" style="background:' + cc + '33;color:' + cc + '">' + q.ch + '</div>'
          + '<h2>' + q.q + '</h2>';

  if (q.id !== "budget") {
    // 옵션 버튼 목록
    var isCityStep = (q.id === "city");
    h += '<div class="olist' + (isCityStep ? " grid2" : "") + '" id="OL">';
    var opts = q.opts || [];
    for (var i = 0; i < opts.length; i++) {
      var o   = opts[i];
      var sel = (ans[q.id] === o.t);
      var bs  = sel ? "border-color:" + cc + ";background:" + cc + "22" : "";
      var cs  = sel ? "background:" + cc + ";border-color:" + cc : "";
      h += '<button class="ob' + (sel ? " sel" : "") + '" style="' + bs + '" data-idx="' + i + '">'
         + '<span class="oi">' + o.e + '</span>'
         + '<span class="ot">' + o.t + (o.s ? '<span class="os">' + o.s + '</span>' : '') + '</span>'
         + '<span class="oc" style="' + cs + '">' + (sel ? "&#10003;" : "") + '</span>'
         + '</button>';
    }
    h += '</div>';
    h += '<button class="nb" id="NB" ' + (ans[q.id] ? "" : "disabled") + '>'
       + (isLast ? "✈ 코스 찾기!" : "다음으로 →") + '</button>';
  } else {
    // 예산 슬라이더
    var ci = ans.budget !== undefined ? ans.budget : 2;
    var tl = ["절약 (기본 스팟만)", "알뜰 (기본 스팟만)", "추천 (선택 스팟 1개↑)", "여유 (선택 스팟 2개↑)", "프리미엄 (모든 스팟)", "프리미엄 (모든 스팟)", "프리미엄 (모든 스팟)"];
    h += '<div class="sb">'
       + '<div class="sd">'
       + '<div class="sv" id="SV">' + BL[ci] + '만원</div>'
       + '<div class="su" id="STIER">' + tl[ci] + '</div>'
       + '</div>'
       + '<div class="st"><span class="sl">2만</span>'
       + '<input type="range" min="0" max="6" value="' + ci + '" oninput="onBudgetSlide(this.value)">'
       + '<span class="sl">20만+</span></div>'
       + '<div class="sm">' + BL.map(function(v){return"<span>"+v+"</span>";}).join("") + '</div>'
       + '<div style="margin-top:14px;background:#fff0f5;border-radius:12px;padding:11px 14px;font-size:.79rem;color:#c06080;line-height:1.6;border-left:3px solid #ff8fab">'
       + '💡 예산이 높을수록 스팟이 자동으로 추가돼요!</div>'
       + '</div>';
    h += '<button class="nb" id="NB">✈ 코스 찾기!</button>';
  }

  document.getElementById("CA").innerHTML = '<div class="qb">' + h + '</div>';

  // ── 이벤트: 옵션 버튼 클릭 ──
  var ol = document.getElementById("OL");
  if (ol) {
    ol.addEventListener("click", function(ev) {
      var btn = ev.target.closest(".ob");
      if (!btn) return;
      var idx = parseInt(btn.getAttribute("data-idx"), 10);
      var o2  = steps[step].opts[idx];
      var qid = steps[step].id;

      // 상위 선택이 바뀌면 하위 초기화
      if (qid === "city")     { ans = {city: o2.t}; }
      else if (qid === "district") { ans.district = o2.t; delete ans.vibe; delete ans.who; delete ans.budget; }
      else if (qid === "vibe")     { ans.vibe = o2.t; delete ans.who; delete ans.budget; }
      else                        { ans[qid] = o2.t; }

      // rebuildSteps 후 같은 스텝 다시 렌더(선택 표시)
      rebuildSteps();
      renderDots();

      // 시각 업데이트 (버튼 선택 표시)
      ol.querySelectorAll(".ob").forEach(function(b) {
        b.classList.remove("sel");
        b.style.borderColor = ""; b.style.background = "";
        var ck = b.querySelector(".oc");
        ck.style.background = ""; ck.style.borderColor = ""; ck.innerHTML = "";
      });
      btn.classList.add("sel");
      btn.style.borderColor = steps[step].cc;
      btn.style.background  = steps[step].cc + "22";
      var ck2 = btn.querySelector(".oc");
      ck2.style.background  = steps[step].cc;
      ck2.style.borderColor = steps[step].cc;
      ck2.innerHTML = "&#10003;";

      document.getElementById("NB").disabled = false;
    });
  }

  // ── 이벤트: 다음 버튼 ──
  document.getElementById("NB").addEventListener("click", function() {
    rebuildSteps();
    if (step < steps.length - 1) {
      render(step + 1);
    } else {
      find();
    }
  });
}

function onBudgetSlide(val) {
  var i  = parseInt(val, 10);
  ans.budget = i;
  document.getElementById("SV").textContent = BL[i] + "만원";
  var tl = ["절약 (기본 스팟만)","알뜰 (기본 스팟만)","추천 (선택 스팟 1개↑)","여유 (선택 스팟 2개↑)","프리미엄 (모든 스팟)","프리미엄 (모든 스팟)","프리미엄 (모든 스팟)"];
  document.getElementById("STIER").textContent = tl[i];
}

// ── 예산 티어 계산 ────────────────────────────────
function getTier(bi) {
  if (bi <= 1) return 0;
  if (bi <= 3) return 1;
  if (bi <= 5) return 2;
  return 3;
}

// ── 코스 찾기 ─────────────────────────────────────
function find() {
  var city     = ans.city;
  var district = ans.district || (CITY_META[city] ? CITY_META[city].districts[0] : null);
  var vibe     = ans.vibe;
  var who      = ans.who;
  var bi       = ans.budget !== undefined ? ans.budget : 2;
  var bv       = BL[bi];

  var course = null;

  // 1. 완전 일치
  for (var i = 0; i < COURSES.length; i++) {
    var c = COURSES[i];
    if (c.city===city && c.district===district && c.vibe===vibe && c.who===who) { course=c; break; }
  }
  // 2. who 폴백
  if (!course) for (var i = 0; i < COURSES.length; i++) {
    var c = COURSES[i];
    if (c.city===city && c.district===district && c.vibe===vibe) { course=c; break; }
  }
  // 3. district 폴백
  if (!course) for (var i = 0; i < COURSES.length; i++) {
    var c = COURSES[i];
    if (c.city===city && c.vibe===vibe && c.who===who) { course=c; break; }
  }
  // 4. city+vibe
  if (!course) for (var i = 0; i < COURSES.length; i++) {
    var c = COURSES[i];
    if (c.city===city && c.vibe===vibe) { course=c; break; }
  }
  // 5. city만
  if (!course) for (var i = 0; i < COURSES.length; i++) {
    if (COURSES[i].city===city) { course=COURSES[i]; break; }
  }

  if (!course) { noMatch(); return; }
  showResult(course, city, bv, bi);
}

// ── 스팟 HTML ─────────────────────────────────────
function stopHTML(s, isOpt, pal, cityDistrict) {
  var ts = TS[s.ty] || TS["activity"];
  var costStr = "";
  if (s.cost && s.cost > 0) {
    costStr = " ~" + (s.cost >= 10000 ? (s.cost/10000).toFixed(s.cost%10000===0?0:1)+"만" : (s.cost/1000)+"천") + "원";
  }
  var query = s.q || s.n;
  var safeQuery = query.replace(/'/g, "\\'").replace(/"/g, '\\"');
  var safeCity = (cityDistrict||"").replace(/'/g, "\\'");
  return '<div class="ti' + (isOpt?" opt-stop":"") + '">'
    + '<div class="tc"><div class="tcr" style="background:' + ts.bg + '">' + s.ic + '</div>'
    + '<div class="tl2">' + s.ti + '</div></div>'
    + '<div class="tf">'
    + '<div class="tty" style="color:' + ts.co + '">' + ts.lb + (isOpt?" ✨":"") + '</div>'
    + '<div class="tn">' + s.n + '</div>'
    + '<div class="td">' + s.d + '</div>'
    + '<div class="tg">'
    + s.tg.map(function(t){return'<span class="tgi">'+t+'</span>';}).join("")
    + (s.st ? '<span class="tst" style="color:'+pal.h+'">★ '+s.st+'</span>' : "")
    + (costStr ? '<span class="tcost">'+costStr+'</span>' : "")
    + '</div>'
    + '<div class="map-btns">'
    + '<button class="map-btn" onclick="openSpotDetail(\''+safeQuery+'\', \''+safeCity+'\')">🗺️ 지도 보기</button>'
    + '<a class="map-btn map-btn-ghost" href="'+kakaoMapUrl(query)+'" target="_blank">🔗 카카오맵</a>'
    + '</div>'
    + "</div></div>";
}

// 예산 tier에 따라 스팟 계산
function getStops(course, tier) {
  var stops = course.base_ss.slice();
  for (var i = 0; i < course.opt_ss.length; i++) {
    var os = course.opt_ss[i];
    if (tier >= os.min_tier) stops.push(os.stop);
  }
  stops.sort(function(a,b){
    return parseInt(a.ti.replace(":",""),10) - parseInt(b.ti.replace(":",""),10);
  });
  return stops;
}

// ── 예산 슬라이더 조작 (결과 화면) ───────────────
function onAdjSlide(val) {
  var bi   = parseInt(val, 10);
  var tier = getTier(bi);
  var v    = Math.round(currentBase * ML[Math.min(bi,4)] / 10000);

  document.getElementById("AN").textContent = v;
  document.getElementById("TV").textContent = v + "만원";
  document.getElementById("AT").textContent = ATIPS[Math.min(bi,4)];
  document.getElementById("ANC").textContent = ANOTICE[Math.min(bi,4)];

  var badge = document.getElementById("AB");
  badge.textContent  = MLBL[Math.min(bi,4)];
  badge.style.background  = bi>2?"#fff0f3":bi<2?"#f0fff4":"#fff";
  badge.style.color       = bi>2?"#e06080":bi<2?"#3a8a5a":"#aaa";
  badge.style.borderColor = bi>2?"#fcd5e0":bi<2?"#caffbf":"#f0e6da";

  if (!currentCourse) return;
  var pal       = PAL[currentCourse.city] || PAL["서울"];
  var stops     = getStops(currentCourse, tier);
  var baseNames = currentCourse.base_ss.map(function(s){return s.n;});
  var cityDist = currentCourse.city + " " + currentCourse.district;
  document.getElementById("STOPS").innerHTML = stops.map(function(s){
    return stopHTML(s, baseNames.indexOf(s.n) === -1, pal, cityDist);
  }).join("");
}

// ── 결과 화면 ─────────────────────────────────────
function showResult(d, city, bv, bi) {
  currentCourse = d;
  currentBase   = d.base;
  var pal  = PAL[city] || PAL["서울"];
  var tier = getTier(bi);
  var iv   = Math.round(currentBase * ML[Math.min(bi,4)] / 10000);

  var stops     = getStops(d, tier);
  var baseNames = d.base_ss.map(function(s){return s.n;});
  var cityDist = city + " " + d.district;
  var ss = stops.map(function(s){
    return stopHTML(s, baseNames.indexOf(s.n)===-1, pal, cityDist);
  }).join("");

  var bg = d.bg.map(function(b2){
    return '<div class="brow"><div class="bl">'+b2.l+'</div><div class="bv" style="color:'+pal.h+'">'+b2.a+'</div></div>';
  }).join("");
  var tp = d.tips.map(function(t){
    return '<div class="tr"><span class="tic">'+t.i+'</span><span>'+t.t+'</span></div>';
  }).join("");

  document.getElementById("R").innerHTML =
    '<div class="rh" style="background:'+pal.bg+'">'
    +'<span class="re">'+d.e+'</span>'
    +'<div class="rt">'+d.t+'</div>'
    +'<div class="rs">'+d.s+'</div>'
    +'<div class="rm">'+d.b.map(function(x){return'<span class="rc">'+x+'</span>';}).join('')
    +'<span class="rc">📍 '+city+'</span>'
    +'<span class="rc">💰 '+bv+'만원</span></div></div>'
    +'<div class="rw" style="background:'+pal.bg+'"><svg viewBox="0 0 480 32" preserveAspectRatio="none" fill="#fff9f5"><path d="M0,32 L0,16 Q60,0 120,16 Q180,32 240,16 Q300,0 360,16 Q420,32 480,16 L480,32 Z"/></svg></div>'
    +'<div class="rb">' +
  ((!KAKAO_READY && (!KAKAO_JS_KEY || KAKAO_JS_KEY === "YOUR_KAKAO_JAVASCRIPT_KEY_HERE")) ? 
   '<div class="api-banner">⚠️ <b>카카오맵이 동작하지 않고 있어요.</b><br>크롬 개발자 도구(F12) > Console 탭을 열어서 어떤 오류가 나오는지 확인해주세요.<br><br>주로 이 두 가지 중 하나예요:<br>1️⃣ <b>로컬 서버 필요</b>: 파일을 더블클릭해서 열면 안 돼요. <code>python3 -m http.server 8000</code> 실행 후 <code>http://localhost:8000</code> 접속<br>2️⃣ <b>도메인 등록 필요</b>: <a href="https://developers.kakao.com" target="_blank">카카오 개발자 사이트</a> > 앱 선택 > [플랫폼] > [Web] 에 <code>http://localhost:8000</code> 등록</div>' : '')
    +'<div class="sh"><span class="sn" style="background:'+pal.h+'">01</span>오늘의 코스</div>'
    +'<div class="tl" id="STOPS">'+ss+'</div>'
    +'<div style="margin-top:10px;background:#fff0f5;border-radius:12px;padding:11px 14px;font-size:.78rem;color:#c06080;line-height:1.6;border-left:3px solid #ff8fab">✨ 아래 슬라이더를 조절하면 스팟이 자동으로 추가/삭제돼요!</div>'
    +'<div class="sh"><span class="sn" style="background:'+pal.h+'">02</span>예산 조절</div>'
    +'<div class="bc"><div class="bgr">'+bg+'</div>'
    +'<div class="adj">'
    +'<div class="adj-title">💰 예산 실시간 조절 · 스팟 자동 추가/삭제</div>'
    +'<div class="adj-display">'
    +'<div class="adj-num-wrap"><span class="adj-num" id="AN">'+iv+'</span><span class="adj-unit">만원</span></div>'
    +'<span class="adj-badge" id="AB">기준</span></div>'
    +'<div class="adj-track"><span class="adj-lbl">절약</span>'
    +'<input class="adj-slider" type="range" min="0" max="6" value="'+bi+'" oninput="onAdjSlide(this.value)">'
    +'<span class="adj-lbl">프리미엄</span></div>'
    +'<div class="adj-marks"><span>2만</span><span>3만</span><span>5만</span><span>7만</span><span>10만</span><span>15만</span><span>20만+</span></div>'
    +'<div class="adj-tip" id="AT">'+ATIPS[Math.min(bi,4)]+'</div>'
    +'<div class="adj-notice" id="ANC">'+ANOTICE[Math.min(bi,4)]+'</div></div>'
    +'<div class="btot"><span class="btot-lbl">💳 예상 합계</span><span class="btot-val" id="TV">'+iv+'만원</span></div></div>'
    +'<div class="sh"><span class="sn" style="background:'+pal.h+'">03</span>꿀팁</div>'
    +'<div class="tp">'+tp+'</div>'
    +'<button class="rbtn" onclick="restart()">↺ 다른 코스 찾기</button></div>';

  document.getElementById("R").classList.add("on");
  document.getElementById("Q").classList.remove("on");
  window.scrollTo(0,0);
}

function noMatch() {
  document.getElementById("R").innerHTML =
    '<div style="padding:40px 20px"><div class="nm">'
    +'<div style="font-size:3rem;margin-bottom:12px">🗺️</div>'
    +'<h3 style="font-family:Pretendard,sans-serif;font-weight:500;font-size:1.4rem;margin-bottom:8px;letter-spacing:-0.4px">딱 맞는 코스를 못 찾았어요</h3>'
    +'<p style="font-size:.82rem;color:#aaa;line-height:1.7">다른 조건으로 다시 시도해보세요!</p>'
    +'<button class="rbtn" style="margin-top:18px" onclick="restart()">↺ 다시 찾기</button>'
    +'</div></div>';
  document.getElementById("R").classList.add("on");
  document.getElementById("Q").classList.remove("on");
}

function restart() {
  step=0; currentCourse=null; currentBase=0; ans={}; steps=[];
  document.getElementById("R").classList.remove("on");
  document.getElementById("R").innerHTML = "";
  document.getElementById("Q").classList.add("on");
  render(0);
  window.scrollTo(0,0);
}

render(0);
</script>
</body>
